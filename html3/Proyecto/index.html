<!DOCTYPE html>
<html lang="es">
<head> 
   <meta charset="UTF-8">
<style>

.login-wrapper {
  min-height: 100vh;;
  
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(6deg, #020b33, #03050f);
}

.login-card-ocean {
  width: 360px;
  padding: 36px 32px 40px;
  border-radius: 28px;
  background: linear-gradient(160deg, #160653, #4337f0);
  box-shadow: 0 30px 80px rgba(62, 50, 236, 0.945);
  text-align: center;
}
.login-logo{
  font-size: 36px;
  margin-bottom: 10px;
}

.login-tittle {
  color: #90dbf4;
  letter-spacing: 2px;
  margin-bottom: 30px;
}

/*Campos del formulario */
.field-ocean{
  position: relative;
  margin-bottom: 28px;
}

.field-ocean input{
  width: 100%;
  padding: 14px 12px;
  border: none;
  border-bottom: 2px solid rgba(144, 219, 0.4);
  background: transparent;
  font-size: 15px;
  color: white;
  outline: none;
}

.field-ocean label{
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.6);
  pointer-events: none;
  transition: all 0.3s ease;
}

.input-box input:focus + label,
.input-box input:not(:placeholder-shown) + label,
.input-box textarea:focus + label,
.input-box textarea:not(:placeholder-shown) + label {
  top: -8px;
  font-size: 11px;
  color: #90dbf4;
}


/*BOTON */
.login-btn-ocean{
  width: 100%;
  margin-top: 10px;
  padding: 14px;
  border: none;
  background: linear-gradient(120deg, #90dbf4, #0077be);
  color: white;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;

}

.input-box {
  position: relative;
  margin: 26px 0;
}

/* INPUT Y TEXTAREA BASE */
.input-box input,
.input-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 2px solid rgba(255,255,255,0.9);
  outline: none;

  /* 👇 CLAVE PARA QUE EL TEXTO NO QUEDE EN MEDIO */
  padding: 6px 4px 2px;
  font-size: 14px;
  line-height: 1.2;
  color: #e6f7ff;
}

/* ALTURA CONTROLADA (NO TOQUES height) */
.input-box input {
  height: 32px;
}

/* TEXTAREA INTEGRADO */
.input-box textarea {
  min-height: 32px;
  resize: none;
}

/* LABEL */
.input-box label {
  position: absolute;
  left: 4px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: #ffffff;
  pointer-events: none;
  transition: 0.3s ease;
}

/* LABEL FLOTA */
.input-box input:focus + label,
.input-box input:valid + label,
.input-box textarea:focus + label,
.input-box textarea:valid + label {
  top: -8px;
  font-size: 11px;
  color: #90dbf4;
}

/* LÍNEA ACTIVA */
.input-box input:focus,
.input-box textarea:focus {
  border-bottom-color: #90dbf4;
  box-shadow: 0 2px 6px rgba(144,219,244,0.35);
}
button {
  width:100%;
  height: 40PX;
  background: #fff;
  border: none;
  outline: none;
  border-radius: 40px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 600;
  color: #000;

}

.submit{
  font-size: 1em;
  color: #fff;
  text-align: center;
  margin: 25px 0 10px;

}

#terminos {
  color: #fff;
 text-decoration: none;
 font-weight: 600;  
}

body{
font-family:   Verdana, Geneva, sans-serif;
}

legend{
  

margin-top: 14px;
  margin-bottom: 36px;
  font-size: 28px;
  font-weight: 600;
  text-align: center;
  letter-spacing: 2px;
  color: #90dbf4;
  text-transform: uppercase;
  text-shadow:
    0 0 8px rgba(144, 219, 244, 0.4),
    0 2px 12px rgba(0, 0, 0, 0.6);

}
legend::after{
  
  content: "";
  display: block;
  width: 60px;
  height: 3px;
  margin: 14px auto 0;
  background: linear-gradient(90deg, #00b4d8, #90dbf4);
  border-radius: 2px;

}







</style>
   </head>
<body>
  <main>
    <div class="login-wrapper">
      <div class="login-card-ocean">
        <div class="login-logo">
          🌊
          </div>
    <form id="registroForm">

  <legend>Registro de Usuario</legend>
<div class="input-box">
   <input type="text" id="nombre" placeholder="" required>
  <label for="nombre">Nombre:</label>
 
</div>
<div class="input-box">
   <input type="text" id="apellidos" required>
  <label for="apellidos">Apellidos:</label>
 
</div>
<div class="input-box">
  <input type="email" id="email" required>
  <label for="email">Email:</label>
  
</div>
<div class="input-box">
  <input type="tel" id="telefono" required>
  <label for="telefono">Teléfono:</label>
  
</div>
<div class="input-box">
  <input type="date" id="fecha_nacimiento" required>
  <label for="fecha_nacimiento">Fecha de nacimiento:</label>
  
</div>
<div class="input-box">
  <input type="password" id="password" required>
  <label for="password">Contraseña:</label>
  

</div>
  
<div class="input-box">
<input type="password" id="confirm_password" required>
  <label for="confirm_password">Confirmar contraseña:</label>
  
</div>
<div class="input-box">
  <textarea id="desc" required placeholder=""></textarea>
  <label for="desc">Descripción:</label>
  
</div>
  <br>
    <input type="checkbox" id="terminos" required>
    <label>Acepto los términos y condiciones
  </label>

  <br><br>

  <button type="submit">Registrarse</button>
 </div>
</form>



  </main>
    
  </body>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const form = document.getElementById("registroForm");

  form.addEventListener("submit", (event) => {
    event.preventDefault();

    const nombre = document.getElementById("nombre").value.trim();
    const apellidos = document.getElementById("apellidos").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const fechaNacimiento = document.getElementById("fecha_nacimiento").value;
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirm_password").value;
    const desc = document.getElementById("desc").value.trim();
    const terminos = document.getElementById("terminos").checked;

    if (!nombre || !apellidos || !email || !telefono || !password || !confirmPassword) {
      alert("Completa todos los campos");
      return;
    }

    if (password !== confirmPassword) {
      alert("Las contraseñas no coinciden");
      return;
    }

    if (!terminos) {
      alert("Debes aceptar los términos");
      return;
    }

    const usuarioRegistrado = {
      nombre:nombre,
      apellidos:apellidos,
      email:email,
      telefono:telefono,
      fechaNacimiento:fechaNacimiento,
      desc:desc
    };

    localStorage.setItem("usuario", JSON.stringify(usuarioRegistrado));

    window.location.href = "Definitiva.html";
  });

});
</script>


</html>
